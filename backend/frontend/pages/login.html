<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ISO Secure 27001</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/auth.js" defer></script>
    

</head>
<body class="login-page">
    <div class="login-container">
        <h2>ISO SECURE 27001</h2>
        <p>Sistema de Gestión de Auditoría y Cumplimiento</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" required placeholder="ejemplo@empresa.com">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary">Iniciar Sesión</button>
        </form>
        <p class="footer-text">¿No tienes cuenta? <a href="/registro.html">Registra tu empresa</a></p>
    </div>
</body>
</html>
