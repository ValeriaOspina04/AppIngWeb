<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Empresa - ISO Secure</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/auth.js" defer></script>
</head>
<body class="login-page">
    <div class="login-container" style="max-width: 500px;">
        <h2>Registro de Empresa</h2>
        <form id="registerForm" onsubmit="event.preventDefault(); return false;">
            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombre" required>
            </div>
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" required>
            </div>
            <div class="input-group">
                <label>Rol en el Proyecto</label>
                <select id="rol" class="input-group" style="width:100%; padding:0.8rem; border-radius:4px;">
                    <option value="capacitador">Capacitador</option>
                    <option value="implementador">Implementador</option>
                    <option value="auditor">Auditor</option>
                    <option value="todos">Los tres roles</option>
                </select>
            </div>

            <hr style="margin: 20px 0; border: 0.5px solid #eee;">

            <div class="input-group">
                <label>Nombre de la Empresa</label>
                <input type="text" id="nombre_empresa" required>
            </div>
            <div class="input-group">
                <label>Representante Legal</label>
                <input type="text" id="representante_legal" required>
            </div>
            <div class="input-group">
                <label>Tipo de Empresa</label>
                <input type="text" id="tipo_empresa" placeholder="Ej: Tecnología, Salud..." required>
            </div>
            <div>
            <button type="submit" class="btn-primary">Registrar Empresa</button>
            <button type="button" onclick="window.location.href='login.html'" class="btn-secondary-outline">
                Volver al Login
            </button>
            </div>
        </form>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
